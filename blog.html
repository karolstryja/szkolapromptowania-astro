<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <title>Blog — Szkoła Promptowania</title>
  <meta content="width=device-width, initial-scale=1" name="viewport">
  <link href="css/normalize.css" rel="stylesheet">
  <link href="css/webflow.css" rel="stylesheet">
  <link href="css/karols-stunning-site-350399.webflow.css" rel="stylesheet">
  <link href="images/favicon.svg" rel="shortcut icon" type="image/x-icon">
  <link href="images/webclip.svg" rel="apple-touch-icon">
  <script>
    (function(){
      var s = localStorage.getItem('theme');
      if (s) { document.documentElement.setAttribute('data-theme', s); }
      else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <style>
    /* ═══════════════════════════════════════════
       BLOG — full-width hero + wąski tekst + masonry
       ═══════════════════════════════════════════ */

    /* ── Hero — pełna szerokość strony ── */
    .blog-hero-wrapper {
      width: 100%;
      overflow: hidden;
    }
    .blog-hero-image {
      width: 100%;
      height: 520px;
      object-fit: cover;
      display: block;
    }
    .blog-hero-video {
      width: 100%;
      height: 520px;
      object-fit: cover;
      display: block;
      background: #000;
    }

    /* ── Narrow article container ── */
    .blog-article {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── Back link ── */
    .blog-back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-family);
      font-size: 14px;
      font-weight: 500;
      color: var(--gray-color);
      text-decoration: none;
      margin-bottom: 32px;
      transition: color 0.2s;
    }
    .blog-back-link:hover { color: var(--primary); }

    /* ── Meta ── */
    .blog-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      font-family: var(--font-family);
      font-size: 14px;
      color: var(--gray-color);
    }
    .blog-meta-tag {
      background: rgba(255,189,89,0.15);
      color: var(--primary);
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
    }

    /* ── Title ── */
    .blog-article-title {
      font-family: var(--font-family);
      font-size: 46px;
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -2px;
      color: var(--text-primary);
      margin: 0 0 48px 0;
    }

    /* ── Article body ── */
    .blog-article-body {
      font-family: var(--font-family);
      font-size: 19px;
      line-height: 1.8;
      color: var(--text-primary);
    }

    /* ── H2 — kropka + linia, większy niż tekst ── */
    .blog-article-body h2 {
      font-size: 28px;
      font-weight: 400;
      letter-spacing: -0.5px;
      color: var(--text-primary);
      margin: 56px 0 24px 0;
      padding-left: 20px;
      position: relative;
    }
    .blog-article-body h2::before {
      content: '●';
      color: var(--primary-tint, var(--primary));
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      font-size: 10px;
    }

    .blog-article-body h3 {
      font-size: 22px;
      font-weight: 400;
      margin: 36px 0 14px 0;
      padding-left: 20px;
      color: var(--text-primary);
      position: relative;
    }
    .blog-article-body h3::before {
      content: '●';
      color: var(--primary-tint, var(--primary));
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      font-size: 8px;
      opacity: 0.5;
    }

    /* ── Paragraphs ── */
    .blog-article-body p {
      margin: 0 0 22px 0;
      opacity: 0.88;
    }
    .blog-article-body strong {
      font-weight: 600;
      opacity: 1;
    }

    /* ── Blockquote — minimal, just italic + border ── */
    .blog-article-body blockquote {
      margin: 36px 0;
      padding: 0 0 0 24px;
      border-left: 2px solid var(--primary);
      font-size: 19px;
      font-style: italic;
      line-height: 1.7;
      color: var(--text-primary);
      opacity: 0.75;
    }
    .blog-article-body blockquote p {
      margin: 0;
    }

    /* ── Lists ── */
    .blog-article-body ul,
    .blog-article-body ol {
      margin: 16px 0 24px 0;
      padding-left: 24px;
    }
    .blog-article-body li {
      margin-bottom: 8px;
      opacity: 0.88;
    }
    .blog-article-body li:last-child { margin-bottom: 0; }

    /* ── Code ── */
    .blog-article-body code {
      background: rgba(0,0,0,0.06);
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 16px;
    }
    [data-theme="dark"] .blog-article-body code {
      background: rgba(255,255,255,0.08);
    }
    .blog-article-body pre {
      background: #1a1611;
      color: #f5f0eb;
      padding: 28px 32px;
      border-radius: 14px;
      overflow-x: auto;
      margin: 28px 0;
      font-size: 14px;
      line-height: 1.65;
    }
    .blog-article-body pre code {
      background: none;
      padding: 0;
      color: inherit;
      font-size: inherit;
    }

    /* ── HR ── */
    .blog-article-body hr {
      border: none;
      text-align: center;
      margin: 48px 0;
    }
    .blog-article-body hr::before {
      content: '● ● ●';
      color: var(--primary);
      font-size: 8px;
      letter-spacing: 12px;
      opacity: 0.4;
    }

    /* ═══════════════════════════════════════════
       GALLERIES — breakout z wąskiego kontenera
       Masonry (CSS columns) jako główny layout
       ═══════════════════════════════════════════ */

    .blog-gallery {
      /* Breakout: rozszerzamy z 720px do ~1100px */
      width: calc(100% + 380px);
      margin-left: -190px;
      margin-top: 44px;
      margin-bottom: 44px;
    }
    .blog-gallery img {
      border-radius: 0;
      width: 100%;
      height: auto;
      display: block;
    }
    .blog-gallery figcaption {
      display: none;
    }

    /* Masonry / Bento — editorial asymmetric grid
       1. zdjęcie: duże (2 kolumny lub 2 rzędy)
       reszta: wypełnia siatkę */
    .gallery-masonry {
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr;
      grid-auto-rows: 280px;
      gap: 4px;
    }
    .gallery-masonry figure {
      margin: 0;
      overflow: hidden;
    }
    .gallery-masonry figure img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    /* Pierwsze zdjęcie — duże, 2 rzędy */
    .gallery-masonry figure:nth-child(1) {
      grid-row: span 2;
    }
    /* Przy 4 zdjęciach: 2x2 */
    .gallery-masonry[data-count="4"] {
      grid-template-columns: 1fr 1fr;
      grid-auto-rows: 300px;
    }
    .gallery-masonry[data-count="4"] figure:nth-child(1) {
      grid-row: span 1;
    }
    /* Przy 3 zdjęciach: 1 duże + 2 obok */
    .gallery-masonry[data-count="3"] {
      grid-template-columns: 1.5fr 1fr;
      grid-auto-rows: 220px;
    }
    .gallery-masonry[data-count="3"] figure:nth-child(1) {
      grid-row: span 2;
    }
    /* Przy 2 zdjęciach: pół na pół */
    .gallery-masonry[data-count="2"] {
      grid-template-columns: 1fr 1fr;
      grid-auto-rows: 360px;
    }
    .gallery-masonry[data-count="2"] figure:nth-child(1) {
      grid-row: span 1;
    }
    /* Przy 6+ — ostatnie zdjęcie na 2 kolumny jeśli nieparzyste */
    .gallery-masonry figure:last-child:nth-child(even):not(:nth-child(2)) {
      grid-column: span 2;
    }

    /* Grid — równe kafelki */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 4px;
    }
    .gallery-grid figure { margin: 0; overflow: hidden; }
    .gallery-grid figure img {
      width: 100%;
      height: 260px;
      object-fit: cover;
    }

    /* Fullwidth — viewport edge-to-edge */
    .gallery-fullwidth {
      width: 100vw;
      margin-left: calc(-50vw + 50% + 190px - 190px);
      position: relative;
      left: 50%;
      transform: translateX(-50%);
    }
    .gallery-fullwidth figure { margin: 0; }
    .gallery-fullwidth img {
      max-height: 500px;
      object-fit: cover;
    }

    /* Slider */
    .gallery-slider {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      padding-bottom: 8px;
    }
    .gallery-slider figure {
      flex: none;
      width: 60%;
      scroll-snap-align: center;
      margin: 0;
    }
    .gallery-slider::-webkit-scrollbar { height: 3px; }
    .gallery-slider::-webkit-scrollbar-track { background: rgba(0,0,0,0.04); border-radius: 2px; }
    .gallery-slider::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 2px; }

    /* ── Video — breakout ── */
    .blog-video {
      width: calc(100% + 380px);
      margin-left: -190px;
      margin-top: 44px;
      margin-bottom: 44px;
    }
    .blog-video video {
      width: 100%;
      border-radius: 0;
      max-height: 520px;
      background: #000;
    }

    /* ═══════════════════════════════════════════
       SCROLL ANIMATIONS
       ═══════════════════════════════════════════ */
    .blog-article-body > * {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .blog-article-body > .is-visible {
      opacity: 1;
      transform: translateY(0);
    }
    .blog-article-body > p.is-visible { opacity: 1; }

    /* ═══════════════════════════════════════════
       READING PROGRESS BAR
       ═══════════════════════════════════════════ */
    .reading-progress {
      position: fixed;
      top: 0;
      left: 0;
      width: 0%;
      height: 3px;
      background: var(--primary);
      z-index: 9999;
      transition: width 0.1s linear;
    }

    /* ═══════════════════════════════════════════
       FOOTER (matching landing page)
       ═══════════════════════════════════════════ */
    .footer-inner-wrap { overflow: hidden !important; }
    .footer-watermark {
      position: absolute;
      bottom: -30px; right: -10px;
      font-family: 'CreatoDisplay', sans-serif;
      font-weight: 700; font-size: 180px;
      color: #2a2118; opacity: 0.15;
      line-height: 0.85; white-space: nowrap;
      pointer-events: none; letter-spacing: -5px;
    }
    .footer-row-layout { flex-direction: column !important; gap: 40px; }
    .footer-top-row {
      display: flex; align-items: center;
      justify-content: space-between; gap: 24px; width: 100%;
    }
    .footer-top-row .footer-list.v2 { display: flex; gap: 28px; flex-wrap: wrap; }
    .footer-newsletter-inline { flex-shrink: 0; width: 340px; margin-bottom: 0; }
    .footer-newsletter-form { margin: 0; }
    .footer-newsletter-form .footer-input-wrap { height: 42px; }
    .footer-newsletter-form .footer-form-btn { font-size: 14px; }
    @media (max-width: 991px) {
      .footer-watermark { font-size: 120px; bottom: -20px; letter-spacing: -3px; }
    }
    @media (max-width: 768px) {
      .footer-watermark { font-size: 80px; bottom: -14px; right: -5px; letter-spacing: -2px; }
      .footer-top-row { flex-direction: column; align-items: flex-start; gap: 24px; }
      .footer-newsletter-inline { width: 100%; }
    }

    /* ═══════════════════════════════════════════
       NAVBAR OVERRIDES
       ═══════════════════════════════════════════ */
    .navbar-brand .image { max-width: none; max-height: none; height: 44px; width: auto; }
    .navbar-brand.w--current { align-self: center !important; }
    .navber-menu-wrap { display: flex; align-items: center; gap: 12px; }
    .primary-btn-wrap { background-color: var(--primary) !important; border-color: var(--primary) !important; }
    .primary-btn-wrap .button-text { color: #09080e !important; text-transform: none !important; }
    .primary-btn-wrap .arrow-01 { filter: brightness(0) !important; }
    [data-theme="dark"] .navbar-no-shadow-container { background-color: var(--bg-body); }
    [data-theme="dark"] .navbar-brand .image { filter: invert(1); }

    /* Theme toggle */
    .theme-toggle { background: none; border: 1.5px solid var(--border-color, #ececec); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-primary); transition: border-color 0.3s; }
    .theme-toggle:hover { border-color: var(--primary); }
    .theme-icon.moon { display: none; }
    [data-theme="dark"] .theme-icon.moon { display: block; }
    [data-theme="dark"] .theme-icon.sun { display: none; }

    /* ═══════════════════════════════════════════
       RESPONSIVE
       ═══════════════════════════════════════════ */
    @media (max-width: 1100px) {
      /* Gallery/video breakout zmniejszamy */
      .blog-gallery,
      .blog-video {
        width: calc(100% + 120px);
        margin-left: -60px;
      }
      .gallery-masonry { grid-template-columns: 1fr 1fr !important; grid-auto-rows: 240px !important; }
      .gallery-masonry figure:nth-child(1) { grid-row: span 2; }
    }

    @media (max-width: 768px) {
      .blog-hero-image,
      .blog-hero-video { height: 280px; }

      .blog-article { padding: 0 18px; }
      .blog-article-title {
        font-size: 32px;
        letter-spacing: -1px;
        margin-bottom: 32px;
      }
      .blog-article-body {
        font-size: 17px;
        line-height: 1.75;
      }
      .blog-article-body h2 { font-size: 24px; margin-top: 44px; }
      .blog-article-body h3 { font-size: 19px; }

      .blog-article-body blockquote { font-size: 17px; }
      .blog-article-body pre {
        margin: 24px -18px;
        padding: 20px 18px;
        border-radius: 0;
      }

      /* Galerie i video na pełną szerokość mobile */
      .blog-gallery,
      .blog-video {
        width: calc(100% + 36px);
        margin-left: -18px;
      }
      .gallery-masonry {
        grid-template-columns: 1fr 1fr !important;
        grid-auto-rows: 180px !important;
      }
      .gallery-masonry figure:nth-child(1) { grid-row: span 1; }
      .gallery-grid { grid-template-columns: 1fr; }
      .gallery-slider figure { width: 80%; }

      .blog-article-body > * { transform: translateY(12px); }
    }
  </style>
</head>

    <!-- Hero — full width, outside article container -->

      <div class="blog-article">

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var slug = params.get('post');

      if (!slug) {
        document.getElementById('blog-title').textContent = 'Nie znaleziono wpisu';
        return;
      }

      fetch('blog/posts/' + slug + '.md')
        .then(function(r) {
          if (!r.ok) throw new Error('Not found');
          return r.text();
        })
        .then(function(md) {
          var parts = md.split('---');
          var frontmatter = {};
          if (parts.length >= 3) {
            parts[1].trim().split('\n').forEach(function(line) {
              var idx = line.indexOf(':');
              if (idx > 0) {
                var key = line.substring(0, idx).trim();
                var val = line.substring(idx + 1).trim();
                frontmatter[key] = val;
              }
            });
            md = parts.slice(2).join('---').trim();
          }

          document.title = (frontmatter.title || slug) + ' — Szkoła Promptowania';
          document.getElementById('blog-title').textContent = frontmatter.title || slug;

          // Hero — full width
          if (frontmatter.image) {
            var imgPath = frontmatter.image.replace(/^\//, '');
            if (imgPath.match(/\.(mp4|webm|mov)$/i)) {
              var heroVid = document.getElementById('blog-hero-video');
              heroVid.src = imgPath;
              heroVid.style.display = 'block';
            } else {
              var heroImg = document.getElementById('blog-hero');
              heroImg.src = imgPath;
              heroImg.alt = frontmatter.title || '';
              heroImg.style.display = 'block';
            }
          }

          // Meta
          var metaHtml = '';
          if (frontmatter.date) {
            var d = new Date(frontmatter.date);
            metaHtml += '<span>' + d.toLocaleDateString('pl-PL', { year: 'numeric', month: 'long', day: 'numeric' }) + '</span>';
          }
          if (frontmatter.tags) {
            var tags = frontmatter.tags.replace(/[\[\]]/g, '').split(',');
            tags.forEach(function(t) {
              metaHtml += '<span class="blog-meta-tag">' + t.trim() + '</span>';
            });
          }
          document.getElementById('blog-meta').innerHTML = metaHtml;

          // :::video
          md = md.replace(/:::video\n([\s\S]*?):::/g, function(match, content) {
            var src = content.trim().replace(/^\//, '');
            return '<div class="blog-video"><video src="' + src + '" controls playsinline preload="metadata"></video></div>';
          });

          // :::gallery-TYPE
          md = md.replace(/:::gallery-(masonry|grid|fullwidth|slider)\n([\s\S]*?):::/g, function(match, layout, content) {
            var lines = content.trim().split('\n');
            var count = lines.length;
            var figures = lines.map(function(line) {
              var pts = line.split('|');
              var src = pts[0].trim().replace(/^\//, '');
              var caption = pts[1] ? pts[1].trim() : '';
              return '<figure><img src="' + src + '" alt="' + caption + '" loading="lazy"></figure>';
            }).join('\n');
            return '<div class="blog-gallery gallery-' + layout + '" data-count="' + count + '">' + figures + '</div>';
          });

          document.getElementById('blog-content').innerHTML = marked.parse(md);
          initScrollAnimations();
          initReadingProgress();
        })
        .catch(function(err) {
          document.getElementById('blog-title').textContent = 'Nie znaleziono wpisu';
          document.getElementById('blog-content').innerHTML = '<p>Wpis o adresie "' + slug + '" nie istnieje. <a href="index.html#Blog">Wróć do strony głównej</a>.</p>';
        });

      function initScrollAnimations() {
        var els = document.querySelectorAll('.blog-article-body > *');
        if (!els.length) return;
        if ('IntersectionObserver' in window) {
          var obs = new IntersectionObserver(function(entries) {
            entries.forEach(function(e) {
              if (e.isIntersecting) { e.target.classList.add('is-visible'); obs.unobserve(e.target); }
            });
          }, { threshold: 0.1, rootMargin: '0px 0px -30px 0px' });
          els.forEach(function(el) { obs.observe(el); });
        } else {
          els.forEach(function(el) { el.classList.add('is-visible'); });
        }
      }

      function initReadingProgress() {
        var bar = document.getElementById('reading-progress');
        var article = document.querySelector('.blog-article');
        if (!bar || !article) return;
        window.addEventListener('scroll', function() {
          var top = article.offsetTop;
          var h = article.offsetHeight;
          var wh = window.innerHeight;
          var sy = window.scrollY || window.pageYOffset;
          var p = (sy - top + wh * 0.3) / (h - wh * 0.5);
          bar.style.width = (Math.min(Math.max(p, 0), 1) * 100) + '%';
        }, { passive: true });
      }

      var toggle = document.getElementById('theme-toggle');
      if (toggle) {
        toggle.addEventListener('click', function() {
          var c = document.documentElement.getAttribute('data-theme');
          var n = c === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', n);
          localStorage.setItem('theme', n);
        });
      }
      // ── Load footer component ──
      fetch('components/footer.html')
        .then(function(r) { return r.ok ? r.text() : ''; })
        .then(function(html) {
          var fc = document.getElementById('footer-component');
          if (fc && html) fc.innerHTML = html;
        });
    })();
  </script>
</body>
</html>
