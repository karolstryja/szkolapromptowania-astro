<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <title>Blog — Szkoła Promptowania</title>
  <meta content="width=device-width, initial-scale=1" name="viewport">
  <link href="css/normalize.css" rel="stylesheet">
  <link href="css/webflow.css" rel="stylesheet">
  <link href="css/karols-stunning-site-350399.webflow.css" rel="stylesheet">
  <link href="images/favicon.svg" rel="shortcut icon" type="image/x-icon">
  <link href="images/webclip.svg" rel="apple-touch-icon">
  <script>
    (function(){
      var s = localStorage.getItem('theme');
      if (s) { document.documentElement.setAttribute('data-theme', s); }
      else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <style>
    /* Blog post article styles */
    .blog-article {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px;
    }
    .blog-hero-image {
      width: 100%;
      max-height: 480px;
      object-fit: cover;
      border-radius: 16px;
      margin-bottom: 48px;
    }
    .blog-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
      font-family: var(--font-family);
      font-size: 14px;
      color: var(--gray-color);
    }
    .blog-meta-tag {
      background: rgba(255,189,89,0.15);
      color: var(--primary);
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
    }
    .blog-article-title {
      font-family: var(--font-family);
      font-size: 52px;
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -2px;
      color: var(--text-primary);
      margin: 0 0 32px 0;
    }
    .blog-article-body {
      font-family: var(--font-family);
      font-size: 18px;
      line-height: 1.75;
      color: var(--text-primary);
      opacity: 0.85;
    }
    .blog-article-body h2 {
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin: 48px 0 16px 0;
      opacity: 1;
      color: var(--text-primary);
    }
    .blog-article-body h3 {
      font-size: 24px;
      font-weight: 600;
      margin: 36px 0 12px 0;
      opacity: 1;
      color: var(--text-primary);
    }
    .blog-article-body p {
      margin: 0 0 20px 0;
    }
    .blog-article-body strong {
      font-weight: 700;
      opacity: 1;
    }
    .blog-article-body blockquote {
      border-left: 3px solid var(--primary);
      margin: 32px 0;
      padding: 20px 28px;
      background: rgba(255,189,89,0.06);
      border-radius: 0 12px 12px 0;
      font-size: 19px;
      font-style: italic;
      line-height: 1.6;
      color: var(--text-primary);
      opacity: 0.9;
    }
    .blog-article-body blockquote p {
      margin: 0;
    }
    .blog-article-body code {
      background: rgba(0,0,0,0.06);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 15px;
    }
    .blog-article-body pre {
      background: #1a1611;
      color: #f5f0eb;
      padding: 24px;
      border-radius: 12px;
      overflow-x: auto;
      margin: 24px 0;
      font-size: 14px;
      line-height: 1.6;
    }
    .blog-article-body pre code {
      background: none;
      padding: 0;
      color: inherit;
      font-size: inherit;
    }
    .blog-article-body ul, .blog-article-body ol {
      padding-left: 24px;
      margin: 16px 0 24px 0;
    }
    .blog-article-body li {
      margin-bottom: 8px;
    }

    /* Gallery layouts */
    .blog-gallery {
      margin: 40px 0;
      width: 100%;
    }
    .blog-gallery img {
      border-radius: 12px;
      width: 100%;
      height: auto;
    }
    .blog-gallery figcaption {
      font-size: 13px;
      color: var(--gray-color);
      text-align: center;
      margin-top: 8px;
    }

    /* Masonry — 2 cols staggered */
    .gallery-masonry {
      columns: 2;
      column-gap: 16px;
    }
    .gallery-masonry figure {
      margin: 0 0 16px 0;
      break-inside: avoid;
    }

    /* Grid — equal cells */
    .gallery-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .gallery-grid figure {
      margin: 0;
    }

    /* Fullwidth — single big image */
    .gallery-fullwidth {
      margin-left: calc(-50vw + 50%);
      margin-right: calc(-50vw + 50%);
      width: 100vw;
    }
    .gallery-fullwidth figure {
      margin: 0;
    }
    .gallery-fullwidth img {
      border-radius: 0;
      max-height: 500px;
      object-fit: cover;
    }

    /* Slider — horizontal scroll */
    .gallery-slider {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      padding-bottom: 12px;
      margin-left: calc(-50vw + 50%);
      margin-right: calc(-50vw + 50%);
      width: 100vw;
      padding-left: calc(50vw - 550px);
      padding-right: calc(50vw - 550px);
    }
    .gallery-slider figure {
      flex: none;
      width: 70%;
      max-width: 560px;
      scroll-snap-align: center;
      margin: 0;
    }
    .gallery-slider::-webkit-scrollbar {
      height: 4px;
    }
    .gallery-slider::-webkit-scrollbar-track {
      background: rgba(0,0,0,0.05);
      border-radius: 2px;
    }
    .gallery-slider::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 2px;
    }

    @media (max-width: 768px) {
      .blog-article-title {
        font-size: 34px;
        letter-spacing: -1px;
      }
      .blog-article-body { font-size: 16px; }
      .blog-article-body h2 { font-size: 26px; }
      .gallery-masonry { columns: 1; }
      .gallery-grid { grid-template-columns: 1fr; }
      .gallery-slider figure { width: 85%; }
      .gallery-slider {
        padding-left: 20px;
        padding-right: 20px;
      }
    }

    /* Blog video embed */
    .blog-video {
      margin: 40px 0;
      width: 100%;
    }
    .blog-video video {
      width: 100%;
      border-radius: 12px;
      max-height: 600px;
      background: #000;
    }
    .blog-hero-video {
      width: 100%;
      max-height: 480px;
      object-fit: cover;
      border-radius: 16px;
      margin-bottom: 48px;
      background: #000;
    }

    /* Back link */
    .blog-back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-family);
      font-size: 14px;
      font-weight: 500;
      color: var(--gray-color);
      text-decoration: none;
      margin-bottom: 40px;
      transition: color 0.2s;
    }
    .blog-back-link:hover { color: var(--primary); }

    /* Navbar overrides (same as index.html) */
    .navbar-brand .image { max-width: none; max-height: none; height: 44px; width: auto; }
    .navbar-brand.w--current { align-self: center !important; }
    .navber-menu-wrap { display: flex; align-items: center; gap: 12px; }
    .primary-btn-wrap { background-color: var(--primary) !important; border-color: var(--primary) !important; }
    .primary-btn-wrap .button-text { color: #09080e !important; text-transform: none !important; }
    .primary-btn-wrap .arrow-01 { filter: brightness(0) !important; }
    [data-theme="dark"] .navbar-no-shadow-container { background-color: var(--bg-body); }
    [data-theme="dark"] .navbar-brand .image { filter: invert(1); }

    /* Theme toggle */
    .theme-toggle { background: none; border: 1.5px solid var(--border-color, #ececec); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-primary); transition: border-color 0.3s; }
    .theme-toggle:hover { border-color: var(--primary); }
    .theme-icon.moon { display: none; }
    [data-theme="dark"] .theme-icon.moon { display: block; }
    [data-theme="dark"] .theme-icon.sun { display: none; }
  </style>
</head>
<body>

      <div data-animation="default" data-collapse="medium" data-duration="400" data-easing="ease" data-easing2="ease" role="banner" class="navbar-no-shadow-container w-nav">

          <div class="navbar-wrapper">

              <a href="index.html" class="navbar-brand w-nav-brand"><img src="images/logo.svg" loading="lazy" alt="Szkoła Promptowania" class="image"></a>
            </div>
            <nav role="navigation" class="nav-menu-wrapper w-nav-menu">
              <div class="navber-wrapper">
                <ul role="list" class="nav-menu w-list-unstyled">
                  <li><a href="index.html#Home" class="nav-link">start</a><div class="line"></div></li>
                  <li><a href="index.html#about" class="nav-link">o nas</a><div class="line"></div></li>

                  <li><a href="index.html#Pricing" class="nav-link">cennik</a><div class="line"></div></li>

                </ul>

                  <button id="theme-toggle" class="theme-toggle" aria-label="Przełącz tryb ciemny" type="button">
                    <svg class="theme-icon sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>

    <!-- Blog article content -->
    <section class="section" style="padding-top: 140px;">
      <div class="blog-article">
        <a href="index.html#Blog" class="blog-back-link">← wróć do strony głównej</a>
        <div id="blog-meta" class="blog-meta"></div>

        <img id="blog-hero" class="blog-hero-image" alt="" style="display:none;">

          <p style="font-family: var(--font-family); font-size: 14px; color: var(--white); opacity: 0.6; margin: 0; text-align: center;">© 2026 Szkoła Promptowania. Wszelkie prawa zastrzeżone.</p>
        </div>
      </section>
    </div>
  </div>

  <!-- Marked.js from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    (function() {
      // Get slug from URL
      var params = new URLSearchParams(window.location.search);
      var slug = params.get('post');

      if (!slug) {
        document.getElementById('blog-title').textContent = 'Nie znaleziono wpisu';
        return;
      }

      // Fetch markdown
      fetch('blog/posts/' + slug + '.md')
        .then(function(r) {
          if (!r.ok) throw new Error('Not found');
          return r.text();
        })
        .then(function(md) {
          // Parse frontmatter
          var parts = md.split('---');
          var frontmatter = {};
          if (parts.length >= 3) {
            parts[1].trim().split('\n').forEach(function(line) {
              var idx = line.indexOf(':');
              if (idx > 0) {
                var key = line.substring(0, idx).trim();
                var val = line.substring(idx + 1).trim();
                frontmatter[key] = val;
              }
            });
            md = parts.slice(2).join('---').trim();
          }

          // Set title and meta
          document.title = (frontmatter.title || slug) + ' — Szkoła Promptowania';
          document.getElementById('blog-title').textContent = frontmatter.title || slug;

          // Hero image or video
          if (frontmatter.image) {
            var imgPath = frontmatter.image.replace(/^\//, '');
            if (imgPath.match(/\.(mp4|webm|mov)$/i)) {
              var heroVid = document.getElementById('blog-hero-video');
              heroVid.src = imgPath;
              heroVid.style.display = 'block';
            } else {
              var heroImg = document.getElementById('blog-hero');
              heroImg.src = imgPath;
              heroImg.alt = frontmatter.title || '';
              heroImg.style.display = 'block';
            }
          }

          // Meta (date + tags)
          var metaHtml = '';
          if (frontmatter.date) {
            var d = new Date(frontmatter.date);
            metaHtml += '<span>' + d.toLocaleDateString('pl-PL', { year: 'numeric', month: 'long', day: 'numeric' }) + '</span>';
          }
          if (frontmatter.tags) {
            var tags = frontmatter.tags.replace(/[\[\]]/g, '').split(',');
            tags.forEach(function(t) {
              metaHtml += '<span class="blog-meta-tag">' + t.trim() + '</span>';
            });
          }
          document.getElementById('blog-meta').innerHTML = metaHtml;

          // Process custom video syntax
          md = md.replace(/:::video\n([\s\S]*?):::/g, function(match, content) {
            var src = content.trim().replace(/^\//, '');
            return '<div class="blog-video"><video src="' + src + '" controls playsinline preload="metadata"></video></div>';
          });

          // Process custom gallery syntax before markdown
          var galleryLayout = (frontmatter.gallery_layout || 'grid').trim();
          md = md.replace(/:::gallery-(masonry|grid|fullwidth|slider)\n([\s\S]*?):::/g, function(match, layout, content) {
            var figures = content.trim().split('\n').map(function(line) {
              var parts = line.split('|');
              var src = parts[0].trim().replace(/^\//, '');
              var caption = parts[1] ? parts[1].trim() : '';
              return '<figure><img src="' + src + '" alt="' + caption + '" loading="lazy">' +
                     (caption ? '<figcaption>' + caption + '</figcaption>' : '') + '</figure>';
            }).join('\n');
            return '<div class="blog-gallery gallery-' + layout + '">' + figures + '</div>';
          });

          // Render markdown
          var html = marked.parse(md);
          document.getElementById('blog-content').innerHTML = html;
        })
        .catch(function(err) {
          document.getElementById('blog-title').textContent = 'Nie znaleziono wpisu';
          document.getElementById('blog-content').innerHTML = '<p>Wpis o adresie "' + slug + '" nie istnieje. <a href="index.html#Blog">Wróć do strony głównej</a>.</p>';
        });

      // Theme toggle
      var toggle = document.getElementById('theme-toggle');
      if (toggle) {
        toggle.addEventListener('click', function() {
          var current = document.documentElement.getAttribute('data-theme');
          var next = current === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          localStorage.setItem('theme', next);
        });
      }
    })();
  </script>
</body>
