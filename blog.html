<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <title>Blog — Szkoła Promptowania</title>
  <meta content="width=device-width, initial-scale=1" name="viewport">
  <link href="css/normalize.css" rel="stylesheet">
  <link href="css/webflow.css" rel="stylesheet">
  <link href="css/karols-stunning-site-350399.webflow.css" rel="stylesheet">
  <link href="images/favicon.svg" rel="shortcut icon" type="image/x-icon">
  <link href="images/webclip.svg" rel="apple-touch-icon">
  <script>
    (function(){
      var s = localStorage.getItem('theme');
      if (s) { document.documentElement.setAttribute('data-theme', s); }
      else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <style>
    /* ═══════════════════════════════════════════
       MEDIUM-STYLE EDITORIAL LAYOUT
       Narrow text (~660px) + wide breakout media
       ═══════════════════════════════════════════ */

    .blog-article {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px;
      overflow: hidden;
    }

    /* ── Hero image / video ── */
    .blog-hero-image {
      width: 100%;
      max-height: 520px;
      object-fit: cover;
      border-radius: 16px;
      margin-bottom: 48px;
    }
    .blog-hero-video {
      width: 100%;
      max-height: 520px;
      object-fit: cover;
      border-radius: 16px;
      margin-bottom: 48px;
      background: #000;
    }

    /* ── Meta (date + tags) ── */
    .blog-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      font-family: var(--font-family);
      font-size: 14px;
      color: var(--gray-color);
    }
    .blog-meta-tag {
      background: rgba(255,189,89,0.15);
      color: var(--primary);
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
    }

    /* ── Title ── */
    .blog-article-title {
      font-family: var(--font-family);
      font-size: 52px;
      font-weight: 700;
      line-height: 1.08;
      letter-spacing: -2px;
      color: var(--text-primary);
      margin: 0 0 40px 0;
      max-width: 820px;
    }

    /* ── Article body — the editorial column ── */
    .blog-article-body {
      font-family: var(--font-family);
      font-size: 18px;
      line-height: 1.8;
      color: var(--text-primary);
      opacity: 0.88;
    }

    /* Narrow text column — centered within 1100px container */
    .blog-article-body > p,
    .blog-article-body > h2,
    .blog-article-body > h3,
    .blog-article-body > ul,
    .blog-article-body > ol,
    .blog-article-body > pre,
    .blog-article-body > hr {
      max-width: 660px;
      margin-left: auto;
      margin-right: auto;
    }

    .blog-article-body h2 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-top: 56px;
      margin-bottom: 20px;
      opacity: 1;
      color: var(--text-primary);
    }
    .blog-article-body h3 {
      font-size: 22px;
      font-weight: 600;
      margin-top: 40px;
      margin-bottom: 14px;
      opacity: 1;
      color: var(--text-primary);
    }
    .blog-article-body p {
      margin-top: 0;
      margin-bottom: 22px;
    }
    .blog-article-body strong {
      font-weight: 700;
      opacity: 1;
    }

    /* ── Blockquote — slightly wider, accent treatment ── */
    .blog-article-body blockquote {
      max-width: 760px;
      margin: 44px auto;
      padding: 28px 36px;
      border-left: 4px solid var(--primary);
      background: rgba(255,189,89,0.06);
      border-radius: 0 16px 16px 0;
      font-size: 20px;
      font-style: italic;
      line-height: 1.6;
      color: var(--text-primary);
      opacity: 0.92;
      position: relative;
    }
    .blog-article-body blockquote::before {
      content: '"';
      position: absolute;
      top: -8px;
      left: 20px;
      font-size: 64px;
      font-family: Georgia, serif;
      color: var(--primary);
      opacity: 0.25;
      line-height: 1;
    }
    .blog-article-body blockquote p {
      margin: 0;
      max-width: none;
    }

    /* ── Code blocks ── */
    .blog-article-body code {
      background: rgba(0,0,0,0.06);
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 15px;
    }
    [data-theme="dark"] .blog-article-body code {
      background: rgba(255,255,255,0.08);
    }
    .blog-article-body pre {
      background: #1a1611;
      color: #f5f0eb;
      padding: 28px 32px;
      border-radius: 14px;
      overflow-x: auto;
      margin-top: 24px;
      margin-bottom: 28px;
      font-size: 14px;
      line-height: 1.65;
    }
    .blog-article-body pre code {
      background: none;
      padding: 0;
      color: inherit;
      font-size: inherit;
    }

    /* ── Lists ── */
    .blog-article-body ul, .blog-article-body ol {
      padding-left: 24px;
      margin-top: 12px;
      margin-bottom: 24px;
    }
    .blog-article-body li {
      margin-bottom: 10px;
    }
    .blog-article-body li strong {
      color: var(--primary);
    }

    /* ── Horizontal rule ── */
    .blog-article-body hr {
      border: none;
      height: 1px;
      background: var(--border-color, #ececec);
      margin: 48px auto;
    }

    /* ═══════════════════════════════════════════
       GALLERIES — wide breakout (full container)
       ═══════════════════════════════════════════ */
    .blog-gallery {
      margin: 48px 0;
      width: 100%;
    }
    .blog-gallery img {
      border-radius: 12px;
      width: 100%;
      height: auto;
    }
    .blog-gallery figcaption {
      font-size: 13px;
      color: var(--gray-color);
      text-align: center;
      margin-top: 8px;
      font-style: italic;
    }

    /* Masonry */
    .gallery-masonry {
      columns: 2;
      column-gap: 16px;
    }
    .gallery-masonry figure {
      margin: 0 0 16px 0;
      break-inside: avoid;
    }

    /* Grid */
    .gallery-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .gallery-grid figure {
      margin: 0;
    }

    /* Fullwidth — viewport breakout */
    .gallery-fullwidth {
      margin-left: calc(-50vw + 50%);
      margin-right: calc(-50vw + 50%);
      width: 100vw;
    }
    .gallery-fullwidth figure {
      margin: 0;
    }
    .gallery-fullwidth img {
      border-radius: 0;
      max-height: 540px;
      object-fit: cover;
    }

    /* Slider — horizontal scroll, viewport breakout */
    .gallery-slider {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      padding-bottom: 12px;
      margin-left: calc(-50vw + 50%);
      margin-right: calc(-50vw + 50%);
      width: 100vw;
      padding-left: calc(50vw - 550px);
      padding-right: calc(50vw - 550px);
    }
    .gallery-slider figure {
      flex: none;
      width: 70%;
      max-width: 560px;
      scroll-snap-align: center;
      margin: 0;
    }
    .gallery-slider::-webkit-scrollbar {
      height: 4px;
    }
    .gallery-slider::-webkit-scrollbar-track {
      background: rgba(0,0,0,0.05);
      border-radius: 2px;
    }
    .gallery-slider::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 2px;
    }

    /* Video embed — full container width */
    .blog-video {
      margin: 48px 0;
      width: 100%;
    }
    .blog-video video {
      width: 100%;
      border-radius: 14px;
      max-height: 600px;
      background: #000;
    }

    /* ═══════════════════════════════════════════
       SCROLL ANIMATIONS
       ═══════════════════════════════════════════ */
    .blog-article-body > p,
    .blog-article-body > h2,
    .blog-article-body > h3,
    .blog-article-body > ul,
    .blog-article-body > ol,
    .blog-article-body > blockquote,
    .blog-article-body > pre,
    .blog-article-body > .blog-gallery,
    .blog-article-body > .blog-video,
    .blog-article-body > hr {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .blog-article-body > .is-visible {
      opacity: 1;
      transform: translateY(0);
    }
    /* Text elements keep article body opacity */
    .blog-article-body > p.is-visible,
    .blog-article-body > ul.is-visible,
    .blog-article-body > ol.is-visible {
      opacity: 0.88;
    }
    .blog-article-body > blockquote.is-visible {
      opacity: 0.92;
    }
    /* Headings, galleries, videos at full opacity */
    .blog-article-body > h2.is-visible,
    .blog-article-body > h3.is-visible,
    .blog-article-body > .blog-gallery.is-visible,
    .blog-article-body > .blog-video.is-visible {
      opacity: 1;
    }
    .blog-article-body > hr.is-visible {
      opacity: 0.5;
    }

    /* Staggered delays for sequential reveals */
    .blog-article-body > *:nth-child(2) { transition-delay: 0.05s; }
    .blog-article-body > *:nth-child(3) { transition-delay: 0.1s; }

    /* ═══════════════════════════════════════════
       BACK LINK
       ═══════════════════════════════════════════ */
    .blog-back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-family);
      font-size: 14px;
      font-weight: 500;
      color: var(--gray-color);
      text-decoration: none;
      margin-bottom: 40px;
      transition: color 0.2s;
    }
    .blog-back-link:hover { color: var(--primary); }

    /* ═══════════════════════════════════════════
       READING PROGRESS BAR
       ═══════════════════════════════════════════ */
    .reading-progress {
      position: fixed;
      top: 0;
      left: 0;
      width: 0%;
      height: 3px;
      background: var(--primary);
      z-index: 9999;
      transition: width 0.1s linear;
    }

    /* ═══════════════════════════════════════════
       NAVBAR OVERRIDES (consistent with index.html)
       ═══════════════════════════════════════════ */
    .navbar-brand .image { max-width: none; max-height: none; height: 44px; width: auto; }
    .navbar-brand.w--current { align-self: center !important; }
    .navber-menu-wrap { display: flex; align-items: center; gap: 12px; }
    .primary-btn-wrap { background-color: var(--primary) !important; border-color: var(--primary) !important; }
    .primary-btn-wrap .button-text { color: #09080e !important; text-transform: none !important; }
    .primary-btn-wrap .arrow-01 { filter: brightness(0) !important; }
    [data-theme="dark"] .navbar-no-shadow-container { background-color: var(--bg-body); }
    [data-theme="dark"] .navbar-brand .image { filter: invert(1); }

    /* Theme toggle */
    .theme-toggle { background: none; border: 1.5px solid var(--border-color, #ececec); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-primary); transition: border-color 0.3s; }
    .theme-toggle:hover { border-color: var(--primary); }
    .theme-icon.moon { display: none; }
    [data-theme="dark"] .theme-icon.moon { display: block; }
    [data-theme="dark"] .theme-icon.sun { display: none; }

    /* ═══════════════════════════════════════════
       RESPONSIVE
       ═══════════════════════════════════════════ */
    @media (max-width: 768px) {
      .blog-article-title {
        font-size: 32px;
        letter-spacing: -1px;
        margin-bottom: 32px;
      }
      .blog-article-body {
        font-size: 17px;
        line-height: 1.75;
      }
      .blog-article-body h2 {
        font-size: 26px;
        margin-top: 44px;
      }
      .blog-article-body h3 { font-size: 20px; }
      .blog-article-body blockquote {
        font-size: 18px;
        padding: 20px 24px;
        margin: 32px auto;
      }
      .blog-article-body blockquote::before {
        font-size: 48px;
        top: -4px;
        left: 14px;
      }
      .gallery-masonry { columns: 1; }
      .gallery-grid { grid-template-columns: 1fr; }
      .gallery-slider figure { width: 85%; }
      .gallery-slider {
        padding-left: 20px;
        padding-right: 20px;
      }
      .blog-hero-image,
      .blog-hero-video {
        border-radius: 12px;
        max-height: 300px;
      }

      /* On mobile, text column is full-width already */
      .blog-article-body > p,
      .blog-article-body > h2,
      .blog-article-body > h3,
      .blog-article-body > ul,
      .blog-article-body > ol,
      .blog-article-body > pre,
      .blog-article-body > blockquote,
      .blog-article-body > hr {
        max-width: 100%;
      }

      /* Reduce animation distance on mobile */
      .blog-article-body > p,
      .blog-article-body > h2,
      .blog-article-body > h3,
      .blog-article-body > ul,
      .blog-article-body > ol,
      .blog-article-body > blockquote,
      .blog-article-body > pre,
      .blog-article-body > .blog-gallery,
      .blog-article-body > .blog-video,
      .blog-article-body > hr {
        transform: translateY(16px);
      }
    }
  </style>
</head>

    <!-- Blog article content -->
    <section class="section" style="padding-top: 140px;">

          <p style="font-family: var(--font-family); font-size: 14px; color: var(--white); opacity: 0.6; margin: 0; text-align: center;">© 2026 Szkoła Promptowania. Wszelkie prawa zastrzeżone.</p>

  <!-- Marked.js from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    (function() {
      // Get slug from URL
      var params = new URLSearchParams(window.location.search);
      var slug = params.get('post');

      if (!slug) {
        document.getElementById('blog-title').textContent = 'Nie znaleziono wpisu';
        return;
      }

      // Fetch markdown
      fetch('blog/posts/' + slug + '.md')
        .then(function(r) {
          if (!r.ok) throw new Error('Not found');
          return r.text();
        })
        .then(function(md) {
          // Parse frontmatter
          var parts = md.split('---');
          var frontmatter = {};
          if (parts.length >= 3) {
            parts[1].trim().split('\n').forEach(function(line) {
              var idx = line.indexOf(':');
              if (idx > 0) {
                var key = line.substring(0, idx).trim();
                var val = line.substring(idx + 1).trim();
                frontmatter[key] = val;
              }
            });
            md = parts.slice(2).join('---').trim();
          }

          // Set title and meta
          document.title = (frontmatter.title || slug) + ' — Szkoła Promptowania';
          document.getElementById('blog-title').textContent = frontmatter.title || slug;

          // Hero image or video
          if (frontmatter.image) {
            var imgPath = frontmatter.image.replace(/^\//, '');
            if (imgPath.match(/\.(mp4|webm|mov)$/i)) {
              var heroVid = document.getElementById('blog-hero-video');
              heroVid.src = imgPath;
              heroVid.style.display = 'block';
            } else {
              var heroImg = document.getElementById('blog-hero');
              heroImg.src = imgPath;
              heroImg.alt = frontmatter.title || '';
              heroImg.style.display = 'block';
            }
          }

          // Meta (date + tags)
          var metaHtml = '';
          if (frontmatter.date) {
            var d = new Date(frontmatter.date);
            metaHtml += '<span>' + d.toLocaleDateString('pl-PL', { year: 'numeric', month: 'long', day: 'numeric' }) + '</span>';
          }
          if (frontmatter.tags) {
            var tags = frontmatter.tags.replace(/[\[\]]/g, '').split(',');
            tags.forEach(function(t) {
              metaHtml += '<span class="blog-meta-tag">' + t.trim() + '</span>';
            });
          }
          document.getElementById('blog-meta').innerHTML = metaHtml;

          // Process custom video syntax
          md = md.replace(/:::video\n([\s\S]*?):::/g, function(match, content) {
            var src = content.trim().replace(/^\//, '');
            return '<div class="blog-video"><video src="' + src + '" controls playsinline preload="metadata"></video></div>';
          });

          // Process custom gallery syntax before markdown
          var galleryLayout = (frontmatter.gallery_layout || 'grid').trim();
          md = md.replace(/:::gallery-(masonry|grid|fullwidth|slider)\n([\s\S]*?):::/g, function(match, layout, content) {
            var figures = content.trim().split('\n').map(function(line) {
              var parts = line.split('|');
              var src = parts[0].trim().replace(/^\//, '');
              var caption = parts[1] ? parts[1].trim() : '';
              return '<figure><img src="' + src + '" alt="' + caption + '" loading="lazy">' +
                     (caption ? '<figcaption>' + caption + '</figcaption>' : '') + '</figure>';
            }).join('\n');
            return '<div class="blog-gallery gallery-' + layout + '">' + figures + '</div>';
          });

          // Render markdown
          var html = marked.parse(md);
          document.getElementById('blog-content').innerHTML = html;

          // ── Scroll animations via IntersectionObserver ──
          initScrollAnimations();

          // ── Reading progress bar ──
          initReadingProgress();
        })
        .catch(function(err) {
          document.getElementById('blog-title').textContent = 'Nie znaleziono wpisu';
          document.getElementById('blog-content').innerHTML = '<p>Wpis o adresie "' + slug + '" nie istnieje. <a href="index.html#Blog">Wróć do strony głównej</a>.</p>';
        });

      // ── Scroll Animations ──
      function initScrollAnimations() {
        var elements = document.querySelectorAll('.blog-article-body > *');
        if (!elements.length) return;

        // Use IntersectionObserver for performant scroll detection
        if ('IntersectionObserver' in window) {
          var observer = new IntersectionObserver(function(entries) {
            entries.forEach(function(entry) {
              if (entry.isIntersecting) {
                entry.target.classList.add('is-visible');
                observer.unobserve(entry.target); // animate only once
              }
            });
          }, {
            threshold: 0.15,
            rootMargin: '0px 0px -40px 0px'
          });

          elements.forEach(function(el) {
            observer.observe(el);
          });
        } else {
          // Fallback: show all immediately
          elements.forEach(function(el) {
            el.classList.add('is-visible');
          });
        }
      }

      // ── Reading Progress Bar ──
      function initReadingProgress() {
        var progressBar = document.getElementById('reading-progress');
        var article = document.querySelector('.blog-article');
        if (!progressBar || !article) return;

        window.addEventListener('scroll', function() {
          var articleTop = article.offsetTop;
          var articleHeight = article.offsetHeight;
          var windowHeight = window.innerHeight;
          var scrollY = window.scrollY || window.pageYOffset;

          var progress = (scrollY - articleTop + windowHeight * 0.3) / (articleHeight - windowHeight * 0.5);
          progress = Math.min(Math.max(progress, 0), 1);
          progressBar.style.width = (progress * 100) + '%';
        }, { passive: true });
      }

      // ── Theme toggle ──
      var toggle = document.getElementById('theme-toggle');
      if (toggle) {
        toggle.addEventListener('click', function() {
          var current = document.documentElement.getAttribute('data-theme');
          var next = current === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          localStorage.setItem('theme', next);
        });
      }
    })();
  </script>
</body>
</html>
